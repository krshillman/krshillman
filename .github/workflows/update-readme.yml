name: Update README

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:        # allow manual trigger from Actions tab
  push:
    branches:
      - main

jobs:

  # ─── 1a. Personal metrics SVG (krshillman) ──────────────────────────────────
  metrics:
    name: Render github-metrics.svg (personal)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # Base sections to include
          base: header, activity, community, repositories, metadata

          # Show commits, PRs, reviews, issues
          base_indepth: yes

          # ── Plugins ──────────────────────────────────────────────────────────

          # Isometric contribution calendar (great visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Code habits (commit times, languages)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Most-used languages
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8

          # Recent activity (pushes, PRs, reviews)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, review, issue

          # ── Theme ────────────────────────────────────────────────────────────
          config_theme: default
          config_timezone: Australia/Melbourne

  # ─── 1b. Work metrics SVG (chhillman-uom) ───────────────────────────────────
  metrics-work:
    name: Render github-metrics-work.svg (work)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.WORK_TOKEN }}
          user: chhillman-uom
          filename: github-metrics-work.svg

          # Base sections to include
          base: header, activity, community, repositories, metadata

          # Show commits, PRs, reviews, issues
          base_indepth: yes

          # ── Plugins ──────────────────────────────────────────────────────────

          # Isometric contribution calendar (great visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Code habits (commit times, languages)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Most-used languages
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8

          # Recent activity (pushes, PRs, reviews)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, review, issue

          # ── Theme ────────────────────────────────────────────────────────────
          config_theme: default
          config_timezone: Australia/Melbourne

  # ─── 2. Pull latest blog posts from Ghost in the Data RSS feed ──────────────
  #blog-posts:
  #  name: Sync blog posts to README
  #  runs-on: ubuntu-latest
  #  permissions:
  #    contents: write
  #  steps:
  #    - uses: actions/checkout@v4
  #    - uses: gautamkrishnar/blog-post-workflow@v1
  #      with:
  #        feed_list: "https://ghostinthedata.info/index.xml"
  #        max_post_count: 5
  #        readme_path: README.md
  #       comment_tag_name: BLOG-POST-LIST
  #       gh_token: ${{ secrets.GITHUB_TOKEN }}

  # ─── 3. Recent GitHub activity (pushes, PRs, code reviews) ─────────────────
  # Readme-Workflows/recent-activity is the maintained fork of
  # jamesgeorge007/github-activity-readme — updated for Node 24.
  # README markers: <!--RECENT_ACTIVITY:start--> / <!--RECENT_ACTIVITY:end-->
  # ─── 3a. Personal recent activity (krshillman) ──────────────────────────────
  activity:
    name: Sync recent activity to README (personal)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Readme-Workflows/recent-activity@v2.4.1
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
        with:
          CONFIG_FILE: .github/recent-activity.config.yml

  # ─── 3b. Work recent activity (chhillman-uom) ───────────────────────────────
  activity-work:
    name: Sync recent activity to README (work)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: Readme-Workflows/recent-activity@v2.4.1
        env:
          GITHUB_TOKEN: ${{ secrets.WORK_TOKEN }}
        with:
          CONFIG_FILE: .github/recent-activity-work.config.yml
